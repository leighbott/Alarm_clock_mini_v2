[env:alarm_clock]
platform = espressif32@^6.10.0
board = esp32-s3-devkitc-1
framework = arduino

; ── Flash & partition ─────────────────────────────────────────────────────────
board_upload.flash_size       = 16MB
board_build.partitions        = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; ── CPU ───────────────────────────────────────────────────────────────────────
board_build.mcu               = esp32s3
board_build.f_cpu             = 240000000L

; ── USB CDC (built-in USB as Serial port) ─────────────────────────────────────
upload_protocol               = esptool
monitor_speed                 = 115200

extra_scripts = pre:scripts/patch_libs.py

; ── C++ standard ──────────────────────────────────────────────────────────────
; ESP32-audioI2S requires C++17 (std::optional, std::string_view).
; Must unset the framework default before setting the new standard.
build_unflags = -std=gnu++11 -std=gnu++14

; ── Build flags ───────────────────────────────────────────────────────────────
build_flags =
    ; USB CDC
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

    -DCORE_DEBUG_LEVEL=0

    ; LVGL — allows lv_conf.h to be resolved by name from src/
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I${PROJECT_SRC_DIR}

    ; LovyanGFX — configured entirely in lgfx_user.hpp, no flags needed


; ── Libraries ─────────────────────────────────────────────────────────────────
lib_deps =
    lvgl/lvgl @ ^9.2.2
    lovyan03/LovyanGFX @ ^1.2.21
    madhephaestus/ESP32Encoder @ ^0.11.2
    https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.8
    adafruit/RTClib @ ^2.1.4
    adafruit/Adafruit AHTX0 @ ^2.0.5
    adafruit/Adafruit BMP280 Library @ ^2.6.8
    ; SD is bundled with the ESP32 Arduino framework — no external dep needed
